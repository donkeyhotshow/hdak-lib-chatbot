# keep-alive.yml — Prevent free-tier hosting services from sleeping
# Render, Koyeb, and similar platforms spin down free services after
# 15 minutes of inactivity. This workflow pings /api/health every 14
# minutes to keep the instance warm.
#
# Setup:
#   1. Go to your repo → Settings → Secrets and variables → Actions.
#   2. Add a Repository Secret named RENDER_APP_URL with the full URL
#      of your deployed app, e.g. https://hdak-lib-chatbot.onrender.com
#   3. The workflow activates automatically — no further action needed.

name: Keep Alive

on:
  schedule:
    # Runs at minutes 0, 14, 28, 42, 56 of every hour (~every 14 minutes)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        if: ${{ secrets.RENDER_APP_URL != '' }}
        run: |
          URL="${RENDER_APP_URL}/api/health"
          echo "Pinging $URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Health check returned $STATUS"
          fi
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
