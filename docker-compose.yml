version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Set these in a .env file or CI secrets:
      # DATABASE_URL=mysql://user:password@db:3306/hdak_chatbot
      # OPENAI_API_KEY=sk-...
      # COOKIE_SECRET=...
    depends_on:
      db:
        condition: service_healthy
    # Run schema migrations automatically on every cold start, then launch the server.
    # This ensures tables exist on a fresh VPS without any manual DB setup.
    command: sh -c "npm run db:migrate && npm run start"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hdak_chatbot
      MYSQL_USER: hdak
      MYSQL_PASSWORD: hdakpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  mysql_data:
