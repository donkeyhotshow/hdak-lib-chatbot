version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ── Database ────────────────────────────────────────────────────────────
      - DATABASE_URL=mysql://hdak:hdakpassword@db:3306/hdak_chatbot
      # ── AI / LLM ────────────────────────────────────────────────────────────
      # Base URL of the OpenAI-compatible API endpoint (must end with /v1)
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL}
      # Bearer token / API key for the above endpoint
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY}
      # ── Auth ────────────────────────────────────────────────────────────────
      # Secret used to sign session cookies (openssl rand -hex 32)
      - JWT_SECRET=${JWT_SECRET}
      - VITE_APP_ID=${VITE_APP_ID:-}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL:-}
      - OWNER_OPEN_ID=${OWNER_OPEN_ID:-}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL:-}
    depends_on:
      db:
        condition: service_healthy
    # DB migrations run automatically via docker-entrypoint.sh (Dockerfile CMD).
    # No command override needed — the entrypoint handles migration + server start.
    restart: always
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hdak_chatbot
      MYSQL_USER: hdak
      MYSQL_PASSWORD: hdakpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  mysql_data:
