      @keyframes fadeInUp {
        from {

          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {

        }

      @keyframes pulse-soft {

        animation: float 4s ease-in-out infinite;

      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
