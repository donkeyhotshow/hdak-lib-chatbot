# render.yaml — Render.com deployment configuration for hdak-lib-chatbot
# Commit this file to your repo; Render will detect it automatically.
# See: https://render.com/docs/yaml-spec
#
# IMPORTANT: This app requires MySQL 8. Render's native database is PostgreSQL,
# so you must provide an external MySQL connection string via DATABASE_URL
# (e.g. TiDB Serverless, Railway MySQL, or Aiven).
# If DATABASE_URL is omitted the app starts in mock mode (no persistence).

services:
  - type: web
    name: hdak-lib-chatbot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Render sets PORT automatically; the app reads it via process.env.PORT.
    envVars:
      - key: NODE_ENV
        value: production
      # ── AI / LLM ─────────────────────────────────────────────────────────
      - key: BUILT_IN_FORGE_API_URL
        sync: false # fill in the Render dashboard
      - key: BUILT_IN_FORGE_API_KEY
        sync: false # fill in the Render dashboard (mark as secret)
      # ── Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true # Render generates a secure random value
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      # ── Database ─────────────────────────────────────────────────────────
      # Provide an external MySQL 8 connection string.
      # Format: mysql://user:password@host:3306/dbname
      # If omitted, the app runs in mock mode (chat works but no persistence).
      - key: DATABASE_URL
        sync: false

    healthCheckPath: /api/health
    # Migrations run inside docker-entrypoint.sh on every deploy
