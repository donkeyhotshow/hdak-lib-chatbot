services:
  - type: web
    name: hdak-lib-chatbot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false  # Set in Render Dashboard → Environment
      # ── AI: OpenRouter (primary LLM provider) ────────────────────────────
      - key: BUILT_IN_FORGE_API_KEY
        sync: false  # Set in Render Dashboard → Environment (sk-or-v1-...)
      - key: BUILT_IN_FORGE_API_URL
        value: https://openrouter.ai/api/v1
      - key: AI_MODEL_NAME
        value: google/gemini-2.0-flash-lite-preview-02-05
      - key: OPENROUTER_HTTP_REFERER
        value: https://hdak-lib-chatbot.onrender.com
      - key: OPENROUTER_X_TITLE
        value: HDAK Library Intelligence
      # ── AI: Google Gemini (title generation, optional) ────────────────────
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false  # Optional — enables Gemini-based title generation
      # ── App config ─────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: RENDER_APP_URL
        value: https://hdak-lib-chatbot.onrender.com
